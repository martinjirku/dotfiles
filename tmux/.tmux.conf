# ~/.tmux.conf - Tmux configuration

# improve colors
set -g default-shell '/bin/zsh'
set -g default-terminal 'screen-256color'
# When ZDOTDIR is inherited from the parent shell, zsh reads only $ZDOTDIR/.zshrc
# and skips ~/.zshrc — so functions/exports defined after `source $ZDOTDIR/.zshrc`
# in ~/.zshrc (e.g. jwtdecode) disappear in new panes. Clear ZDOTDIR so each pane
# loads the same startup as a normal terminal (~/.zshrc first).
set -g default-command "unset ZDOTDIR; exec zsh"

set -g mouse on
#  act like vim
setw -g mode-keys vi

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+
bind-key | split-window -h
bind-key - split-window -v
bind-key -n C-k send-keys -R \; clear-history

set -g prefix C-s

unbind r
bind-key r source-file ~/.tmux.conf

bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'dracula/tmux'

set -g @dracula-plugins "git kubernetes-context countdown battery cpu-usage ram-usage network-speed vpn"
set -g @dracula-narrow-plugins "compact-alt battery network"
set -g @dracula-continuum-mode countdown

run '~/.tmux/plugins/tpm/tpm'
