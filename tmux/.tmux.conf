# ~/.tmux.conf - Tmux configuration

# ==========================
# General Settings
# ==========================

# Set true color support
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# Performance optimizations
set -g escape-time 0          # Faster command sequences
set -g repeat-time 300        # Reduce repeat timeout

# Enable mouse support
set -g mouse on

# Mouse selection behavior
# Drag to select text automatically enters copy mode and selects
bind-key -n MouseDrag1Pane if-shell -F -t = "#{mouse_any_flag}" "if -Ft= \"#{pane_in_mode}\" \"copy-mode -M\" \"send-keys -M\"" "copy-mode -M"
bind-key -T copy-mode-vi MouseDrag1Pane send-keys -X begin-selection
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# Set base index to 1 (easier to reach on keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Increase scrollback buffer size
set -g history-limit 50000

# Display messages for longer
set -g display-time 4000

# Refresh status line more often (increase for better performance)
set -g status-interval 10

# Focus events enabled for terminals that support them
set -g focus-events on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

# Don't rename windows automatically
set -g allow-rename off

# ==========================
# Key Bindings
# ==========================

# Change prefix from C-b to C-a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload configuration
bind r source-file ~/.config/tmux/.tmux.conf \; display "Config reloaded!"

# Split panes with | and - (more intuitive)
unbind %
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Create new window in current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with vim-style keys
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Toggle pane zoom
bind -r m resize-pane -Z

# Clear screen and scrollback history
bind C-k send-keys -R \; clear-history

# Switch windows with Alt + arrow keys
bind -n M-Left previous-window
bind -n M-Right next-window

# ==========================
# Copy Mode (Vim-style)
# ==========================

# Enable vi mode
setw -g mode-keys vi

# Copy mode bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Configure word separators to select full file paths (exclude /, ., -, _, ~)
set -g word-separators " @\"'()[]{}:,<>|"

# Mouse double-click to select word/path (stays in selection mode for dragging)
bind-key -n DoubleClick1Pane select-pane \; copy-mode -M \; send-keys -X select-word
bind-key -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word

# Mouse triple-click to select line (stays in selection mode)
bind-key -n TripleClick1Pane select-pane \; copy-mode -M \; send-keys -X select-line
bind-key -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line

# Release mouse button to copy selection
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Open copy mode with prefix + [
bind [ copy-mode

# ==========================
# Status Bar
# ==========================

# Status bar colors
set -g status-style bg=default,fg=white

# Left status bar
set -g status-left-length 40
set -g status-left "#[fg=green,bold]#S #[fg=blue]• "

# Right status bar (date, time, hostname — no CPU/RAM/network plugins)
set -g status-right-length 60
set -g status-right "#[fg=cyan]%d %b %R #[fg=white]• #[fg=green,bold]#h"

# Window status format
setw -g window-status-format "#[fg=white] #I:#W "
setw -g window-status-current-format "#[fg=black,bg=green,bold] #I:#W "

# Pane border colors
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=green

# Pane border status (disabled for better performance - was causing lag)
# set -g pane-border-status top
# set -g pane-border-format "#[fg=white,bg=default] #I:#P #[fg=white]• #{?#{==:#{LAST_EXIT_CODE},0},#[fg=green]●,#[fg=red]● [#{LAST_EXIT_CODE}]}#{?#{!=:#{ZSH_COMMAND_TIME},}, #[fg=yellow]⏱ #{ZSH_COMMAND_TIME},} #[fg=white]• #{pane_current_command} - #{pane_current_path} "
set -g pane-border-status off

# Message colors
set -g message-style bg=colour235,fg=green,bold

# ==========================
# Plugins (TPM - Tmux Plugin Manager)
# ==========================

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'Morantron/tmux-fingers'
set -g @plugin 'tmux-plugins/tmux-open'

# Tmux resurrect settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Tmux continuum settings
set -g @continuum-restore 'on'
set -g @continuum-boot 'on'
set -g @continuum-boot-options 'iterm'

# Tmux-fzf settings
TMUX_FZF_LAUNCH_KEY="C-f"

# Tmux-fingers settings
set -g @fingers-key F
set -g @fingers-compact-hints 0

# Tmux-open settings
set -g @open-editor 'o'        # In copy mode: 'o' opens file in $EDITOR
set -g @open 'x'                # In copy mode: 'x' opens file/URL with default app
set -g @open-S 'https://www.google.com/search?q='  # Search selected text with Shift+s

# Initialize TPM (keep this line at the very bottom)
run '~/.config/tmux/plugins/tpm/tpm'
